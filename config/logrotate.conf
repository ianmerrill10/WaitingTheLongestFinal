# WaitingTheLongest.com - Logrotate Configuration
# Install: cp config/logrotate.conf /etc/logrotate.d/waitingthelongest
# Test: logrotate -d /etc/logrotate.d/waitingthelongest

/var/log/waitingthelongest/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 wtl wtl
    sharedscripts
    postrotate
        # Signal the app to reopen log files (if supported)
        docker kill --signal=USR1 wtl-app 2>/dev/null || true
    endscript
}

/var/log/nginx/waitingthelongest_*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 nginx adm
    sharedscripts
    postrotate
        docker exec wtl-nginx nginx -s reopen 2>/dev/null || true
    endscript
}
