# Production overrides for WaitingTheLongest
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d

services:
  app:
    environment:
      - LOG_LEVEL=warn
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '4.0'
        reservations:
          memory: 512M
    restart: always

  db:
    ports: []  # Don't expose DB port in production
    environment:
      - POSTGRES_INITDB_ARGS=-c shared_buffers=512MB -c max_connections=200 -c effective_cache_size=1GB -c work_mem=16MB
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
    restart: always

  redis:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    restart: always

  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf.production:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./static:/usr/share/nginx/html/static:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 64M
    restart: always

  certbot:
    restart: always
