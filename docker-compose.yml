services:
  # WaitingTheLongest C++ Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wtl-app
    expose:
      - "8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=waitingthelongest
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER:-waitingthelongest.com}
      - LOG_LEVEL=info
    volumes:
      - ./config:/app/config:ro
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    tmpfs:
      - /tmp:size=64M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
    networks:
      - wtl-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # PostgreSQL Database
  db:
    image: postgres:16.6-alpine
    container_name: wtl-db
    environment:
      - POSTGRES_DB=waitingthelongest
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_INITDB_ARGS=-c shared_buffers=256MB -c max_connections=200
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
      - ./sql/core:/docker-entrypoint-initdb.d/01-core:ro
      - ./sql/modules:/docker-entrypoint-initdb.d/02-modules:ro
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    networks:
      - wtl-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Redis Cache
  redis:
    image: redis:7.4-alpine
    container_name: wtl-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-changeme} --no-auth-warning ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 64M
    networks:
      - wtl-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: wtl-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 32M
    networks:
      - wtl-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Certbot for SSL Certificate Management
  certbot:
    image: certbot/certbot:v3.1.0
    container_name: wtl-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - wtl-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  wtl-network:
    driver: bridge
