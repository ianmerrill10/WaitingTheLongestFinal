<!-- Sidebar Overlay (for mobile) -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="AdminNav.closeSidebar()"></div>

<script>
// Sidebar toggle functionality
document.getElementById('sidebar-toggle')?.addEventListener('click', function() {
    document.getElementById('admin-sidebar').classList.toggle('collapsed');
    document.querySelector('.admin-main').classList.toggle('sidebar-collapsed');
    localStorage.setItem('sidebarCollapsed', document.getElementById('admin-sidebar').classList.contains('collapsed'));
});

// Restore sidebar state
if (localStorage.getItem('sidebarCollapsed') === 'true') {
    document.getElementById('admin-sidebar')?.classList.add('collapsed');
    document.querySelector('.admin-main')?.classList.add('sidebar-collapsed');
}

// User dropdown toggle
document.getElementById('user-dropdown-trigger')?.addEventListener('click', function(e) {
    e.stopPropagation();
    document.getElementById('user-dropdown-menu').classList.toggle('show');
});

// Close dropdown when clicking outside
document.addEventListener('click', function() {
    document.getElementById('user-dropdown-menu')?.classList.remove('show');
});

// Update active nav link
function updateActiveNav(page) {
    document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
        if (link.dataset.page === page) {
            link.classList.add('active');
        }
    });
}

// Expose to AdminNav
if (typeof AdminNav !== 'undefined') {
    AdminNav.updateSidebarActive = updateActiveNav;
}
</script>
