<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | WaitingTheLongest.com</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .error-container {
            max-width: 600px;
            width: 100%;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            color: #00ff41;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.4), 0 0 40px rgba(0, 255, 65, 0.2);
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            font-variant-numeric: tabular-nums;
        }

        .error-subtitle {
            font-size: 1.75rem;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 1.5rem;
        }

        .error-message {
            font-size: 1.1rem;
            color: #a0a0a0;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .error-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .error-links a {
            display: inline-block;
            padding: 0.75rem 1.75rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .error-links a.primary {
            background-color: #00ff41;
            color: #1a1a1a;
        }

        .error-links a.primary:hover {
            background-color: #33ff66;
            box-shadow: 0 0 16px rgba(0, 255, 65, 0.4);
        }

        .error-links a.secondary {
            background-color: transparent;
            color: #00ff41;
            border: 2px solid #00ff41;
        }

        .error-links a.secondary:hover {
            background-color: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 16px rgba(0, 255, 65, 0.2);
        }

        .led-divider {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff41, transparent);
            margin: 0 auto 2rem auto;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.3);
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 5rem;
            }
            .error-subtitle {
                font-size: 1.25rem;
            }
            .error-message {
                font-size: 1rem;
            }
            .error-links {
                flex-direction: column;
                align-items: center;
            }
            .error-links a {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-subtitle">Page Not Found</h1>
        <div class="led-divider"></div>
        <p class="error-message">
            The dog you're looking for may have found a home! Try browsing our available dogs.
        </p>
        <div class="error-links">
            <a href="/" class="primary">Go Home</a>
            <a href="/dogs.html" class="secondary">Browse Dogs</a>
        </div>
    </div>
</body>
</html>
