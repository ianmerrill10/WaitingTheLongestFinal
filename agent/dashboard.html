<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WTL Agent Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 14px; }
    a { color: #00ff41; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #222; background: #111; }
    .header h1 { font-size: 18px; color: #00ff41; letter-spacing: 1px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .status-badge { padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    .status-running { background: #052e16; color: #00ff41; border: 1px solid #166534; }
    .status-paused { background: #422006; color: #f59e0b; border: 1px solid #92400e; }
    .btn { padding: 6px 16px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-family: inherit; font-size: 12px; transition: all 0.15s; }
    .btn:hover { background: #2a2a2a; border-color: #555; }
    .btn-danger { border-color: #7f1d1d; color: #fca5a5; }
    .btn-danger:hover { background: #450a0a; }
    .btn-success { border-color: #166534; color: #86efac; }
    .btn-success:hover { background: #052e16; }

    /* Main layout */
    .main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px 16px; }
    .stat-label { font-size: 10px; text-transform: uppercase; color: #666; letter-spacing: 1px; margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: bold; color: #00ff41; }
    .stat-value.amber { color: #f59e0b; }
    .stat-value.red { color: #ef4444; }
    .stat-value.blue { color: #60a5fa; }
    .stat-sub { font-size: 10px; color: #555; margin-top: 4px; }

    /* Progress bar */
    .progress-section { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .progress-label { font-size: 13px; color: #ccc; }
    .progress-pct { font-size: 13px; color: #00ff41; font-weight: bold; }
    .progress-bar { height: 20px; background: #222; border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #00ff41, #22c55e); border-radius: 10px; transition: width 0.5s ease; min-width: 2px; }
    .progress-meta { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: #555; }

    /* Two column */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .panel { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; }
    .panel-title { font-size: 12px; text-transform: uppercase; color: #666; letter-spacing: 1px; margin-bottom: 12px; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; }

    /* Task queue */
    .task-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-left: 3px solid #333; margin-bottom: 4px; border-radius: 0 4px 4px 0; font-size: 13px; }
    .task-running { border-left-color: #00ff41; background: #0a1a0a; }
    .task-name { font-weight: bold; }
    .task-time { color: #555; font-size: 11px; }
    .task-running .task-name { color: #00ff41; }

    /* DB health */
    .health-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1f1f1f; font-size: 13px; }
    .health-label { color: #888; }
    .health-value { font-weight: bold; }
    .health-value.good { color: #00ff41; }
    .health-value.warn { color: #f59e0b; }
    .health-value.bad { color: #ef4444; }

    /* Log section */
    .log-section { background: #111; border: 1px solid #2a2a2a; border-radius: 8px; overflow: hidden; }
    .log-controls { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid #222; background: #151515; }
    .log-controls label { font-size: 11px; color: #666; }
    .log-controls select { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: 12px; }
    .autoscroll-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
    .autoscroll-on { background: #052e16; color: #00ff41; }
    .autoscroll-off { background: #422006; color: #f59e0b; }

    .log-container { height: 450px; overflow-y: auto; padding: 4px 0; }
    .log-entry { padding: 2px 16px; font-size: 12px; line-height: 1.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-entry:hover { background: #1a1a1a; white-space: normal; }
    .log-info { color: #777; }
    .log-warn { color: #f59e0b; }
    .log-error { color: #ef4444; background: #1a0505; }
    .log-success { color: #00ff41; }
    .log-time { color: #444; margin-right: 8px; }
    .level-badge { display: inline-block; width: 54px; text-align: center; font-size: 9px; font-weight: bold; border-radius: 3px; padding: 1px 0; margin-right: 6px; letter-spacing: 0.5px; }
    .level-info { background: #222; color: #666; }
    .level-warn { background: #422006; color: #f59e0b; }
    .level-error { background: #450a0a; color: #ef4444; }
    .level-success { background: #052e16; color: #00ff41; }
    .cat-badge { color: #818cf8; font-size: 11px; margin-right: 6px; }

    /* Connection status */
    .conn-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .conn-connected { background: #00ff41; box-shadow: 0 0 4px #00ff41; }
    .conn-disconnected { background: #ef4444; box-shadow: 0 0 4px #ef4444; }

    /* Trigger buttons */
    .trigger-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
    .trigger-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid #333; background: #1a1a1a; color: #aaa; cursor: pointer; font-family: inherit; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .trigger-btn:hover { background: #2a2a2a; color: #fff; border-color: #555; }

    @media (max-width: 1200px) {
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>WTL AGENT DASHBOARD</h1>
    <div class="header-right">
      <span class="conn-dot conn-disconnected" id="conn-dot"></span>
      <span id="conn-text" style="font-size:11px;color:#666">Connecting...</span>
      <span class="status-badge status-running" id="status-badge">RUNNING</span>
      <button class="btn" id="pause-btn" onclick="togglePause()">Pause</button>
    </div>
  </div>

  <div class="main">
    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Uptime</div>
        <div class="stat-value blue" id="stat-uptime">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Dogs/Hour</div>
        <div class="stat-value" id="stat-rate">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Verified</div>
        <div class="stat-value" id="stat-verified">--</div>
        <div class="stat-sub" id="stat-verified-sub"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Deactivated</div>
        <div class="stat-value amber" id="stat-deactivated">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Errors</div>
        <div class="stat-value red" id="stat-errors">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">API Calls</div>
        <div class="stat-value blue" id="stat-api">--</div>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-section" id="progress-section" style="display:none">
      <div class="progress-header">
        <span class="progress-label" id="progress-label">Idle</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-meta">
        <span id="progress-detail">--</span>
        <span id="progress-task">--</span>
      </div>
    </div>

    <!-- Two Columns -->
    <div class="two-col">
      <!-- Task Queue -->
      <div class="panel">
        <div class="panel-title">Task Queue</div>
        <div id="task-queue">
          <div class="task-item"><span class="task-name">Loading...</span></div>
        </div>
        <div class="trigger-btns">
          <button class="trigger-btn" onclick="trigger('verify')">Run Verify</button>
          <button class="trigger-btn" onclick="trigger('sync')">Run Sync</button>
          <button class="trigger-btn" onclick="trigger('audit')">Run Audit</button>
          <button class="trigger-btn" onclick="trigger('urgency')">Run Urgency</button>
          <button class="trigger-btn" onclick="trigger('stats')">Run Stats</button>
        </div>
      </div>

      <!-- DB Health -->
      <div class="panel">
        <div class="panel-title">Database Health</div>
        <div id="db-health">
          <div class="health-row"><span class="health-label">Loading...</span></div>
        </div>
      </div>
    </div>

    <!-- Log Section -->
    <div class="log-section">
      <div class="log-controls">
        <label>Filter:</label>
        <select id="log-filter" onchange="filterLogs()">
          <option value="all">All</option>
          <option value="verify">Verify</option>
          <option value="sync">Sync</option>
          <option value="audit">Audit</option>
          <option value="urgency">Urgency</option>
          <option value="stats">Stats</option>
          <option value="system">System</option>
        </select>
        <label>Level:</label>
        <select id="level-filter" onchange="filterLogs()">
          <option value="all">All</option>
          <option value="success">Success</option>
          <option value="warn">Warning</option>
          <option value="error">Error</option>
        </select>
        <button class="btn" onclick="clearLogs()" style="margin-left:auto">Clear</button>
        <span class="autoscroll-badge autoscroll-on" id="scroll-badge">Auto-scroll: ON</span>
      </div>
      <div class="log-container" id="log-container"></div>
    </div>
  </div>

  <script>
    // State
    let eventSource = null;
    let autoScroll = true;
    let agentPaused = false;
    let currentFilter = "all";
    let currentLevel = "all";

    // ── SSE Connection ──
    function connect() {
      if (eventSource) eventSource.close();
      eventSource = new EventSource("/events");

      eventSource.onopen = () => {
        document.getElementById("conn-dot").className = "conn-dot conn-connected";
        document.getElementById("conn-text").textContent = "Connected";
        document.getElementById("conn-text").style.color = "#00ff41";
      };

      eventSource.onmessage = (e) => {
        try {
          const entry = JSON.parse(e.data);
          appendLog(entry);
        } catch {}
      };

      eventSource.onerror = () => {
        document.getElementById("conn-dot").className = "conn-dot conn-disconnected";
        document.getElementById("conn-text").textContent = "Reconnecting...";
        document.getElementById("conn-text").style.color = "#ef4444";
        setTimeout(connect, 3000);
      };
    }

    // ── Log Rendering ──
    function appendLog(entry) {
      const container = document.getElementById("log-container");
      const div = document.createElement("div");
      div.className = "log-entry log-" + entry.level;
      div.dataset.category = entry.category;
      div.dataset.level = entry.level;

      const time = new Date(entry.timestamp).toLocaleTimeString();
      const levelClass = "level-" + entry.level;
      div.innerHTML =
        '<span class="log-time">' + time + '</span>' +
        '<span class="level-badge ' + levelClass + '">' + entry.level.toUpperCase() + '</span>' +
        '<span class="cat-badge">[' + entry.category + ']</span>' +
        entry.message;

      // Apply filter
      if (currentFilter !== "all" && entry.category !== currentFilter) div.style.display = "none";
      if (currentLevel !== "all" && entry.level !== currentLevel) div.style.display = "none";

      container.appendChild(div);

      // Cap at 2000
      while (container.children.length > 2000) container.removeChild(container.firstChild);

      if (autoScroll) container.scrollTop = container.scrollHeight;
    }

    function clearLogs() {
      document.getElementById("log-container").innerHTML = "";
    }

    function filterLogs() {
      currentFilter = document.getElementById("log-filter").value;
      currentLevel = document.getElementById("level-filter").value;
      const entries = document.querySelectorAll(".log-entry");
      entries.forEach(el => {
        const catMatch = currentFilter === "all" || el.dataset.category === currentFilter;
        const lvlMatch = currentLevel === "all" || el.dataset.level === currentLevel;
        el.style.display = (catMatch && lvlMatch) ? "" : "none";
      });
    }

    // ── Scroll detection ──
    document.getElementById("log-container").addEventListener("scroll", function() {
      const atBottom = this.scrollHeight - this.scrollTop - this.clientHeight < 50;
      autoScroll = atBottom;
      const badge = document.getElementById("scroll-badge");
      badge.textContent = "Auto-scroll: " + (autoScroll ? "ON" : "OFF");
      badge.className = "autoscroll-badge " + (autoScroll ? "autoscroll-on" : "autoscroll-off");
    });

    // ── Metrics Polling ──
    function formatUptime(ms) {
      const s = Math.floor(ms / 1000);
      const d = Math.floor(s / 86400);
      const h = Math.floor((s % 86400) / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (d > 0) return d + "d " + h + "h " + m + "m";
      if (h > 0) return h + "h " + m + "m";
      return m + "m " + (s % 60) + "s";
    }

    function formatNum(n) {
      if (n === null || n === undefined) return "--";
      return n.toLocaleString();
    }

    function formatTimeUntil(isoStr) {
      const diff = new Date(isoStr).getTime() - Date.now();
      if (diff < 0) return "overdue";
      const m = Math.floor(diff / 60000);
      const h = Math.floor(m / 60);
      if (h > 0) return h + "h " + (m % 60) + "m";
      return m + "m";
    }

    async function pollMetrics() {
      try {
        const res = await fetch("/api/metrics");
        if (!res.ok) return;
        const m = await res.json();

        // Stats cards
        document.getElementById("stat-uptime").textContent = formatUptime(m.uptimeMs);
        document.getElementById("stat-rate").textContent = formatNum(m.dogsPerHour);
        document.getElementById("stat-verified").textContent = formatNum(m.totalVerified);
        document.getElementById("stat-verified-sub").textContent = "this session";
        document.getElementById("stat-deactivated").textContent = formatNum(m.totalDeactivated);
        document.getElementById("stat-errors").textContent = formatNum(m.totalErrors);
        document.getElementById("stat-api").textContent = formatNum(m.totalApiCalls);

        // Pause state
        agentPaused = m.isPaused;
        const badge = document.getElementById("status-badge");
        const btn = document.getElementById("pause-btn");
        if (agentPaused) {
          badge.className = "status-badge status-paused";
          badge.textContent = "PAUSED";
          btn.textContent = "Resume";
          btn.className = "btn btn-success";
        } else {
          badge.className = "status-badge status-running";
          badge.textContent = "RUNNING";
          btn.textContent = "Pause";
          btn.className = "btn btn-danger";
        }

        // Progress
        const ps = document.getElementById("progress-section");
        if (m.currentProgress) {
          ps.style.display = "";
          const pct = Math.round((m.currentProgress.current / m.currentProgress.total) * 100);
          document.getElementById("progress-label").textContent = m.currentProgress.label;
          document.getElementById("progress-pct").textContent = pct + "%";
          document.getElementById("progress-fill").style.width = pct + "%";
          document.getElementById("progress-detail").textContent = m.currentProgress.current + " / " + m.currentProgress.total;
          document.getElementById("progress-task").textContent = m.currentTask ? "Task: " + m.currentTask : "";
        } else if (m.currentTask) {
          ps.style.display = "";
          document.getElementById("progress-label").textContent = "Running: " + m.currentTask;
          document.getElementById("progress-pct").textContent = "";
          document.getElementById("progress-fill").style.width = "100%";
          document.getElementById("progress-detail").textContent = "";
          document.getElementById("progress-task").textContent = "";
        } else {
          ps.style.display = "none";
        }

        // Task queue
        const tq = document.getElementById("task-queue");
        tq.innerHTML = m.tasks.map(t => {
          const cls = t.isRunning ? "task-item task-running" : "task-item";
          const status = t.isRunning ? "RUNNING" : "in " + formatTimeUntil(t.nextRun);
          const dur = t.lastDuration ? " (" + Math.round(t.lastDuration / 1000) + "s)" : "";
          const err = t.lastError ? ' <span style="color:#ef4444">ERR</span>' : "";
          return '<div class="' + cls + '">' +
            '<span class="task-name">' + t.name + err + '</span>' +
            '<span class="task-time">' + status + " | runs: " + t.runCount + dur + '</span>' +
            '</div>';
        }).join("");

        // DB Health
        if (m.db) {
          const db = m.db;
          const verClass = db.verifiedPct > 80 ? "good" : db.verifiedPct > 40 ? "warn" : "bad";
          const accClass = db.dateAccuracyPct > 80 ? "good" : db.dateAccuracyPct > 60 ? "warn" : "bad";
          document.getElementById("db-health").innerHTML =
            healthRow("Total Dogs", formatNum(db.totalDogs), "good") +
            healthRow("Verified", formatNum(db.verifiedCount) + " (" + db.verifiedPct + "%)", verClass) +
            healthRow("Date Accuracy", db.dateAccuracyPct + "%", accClass) +
            healthRow("Never Checked", formatNum(db.neverChecked), db.neverChecked > 1000 ? "warn" : "good") +
            healthRow("Days to 100%", db.daysToFullCoverage + " days", db.daysToFullCoverage > 10 ? "warn" : "good") +
            healthRow("Critical Dogs", formatNum(db.criticalDogs), db.criticalDogs > 0 ? "bad" : "good") +
            healthRow("High Urgency", formatNum(db.highUrgencyDogs), db.highUrgencyDogs > 0 ? "warn" : "good");
        }
      } catch {}
    }

    function healthRow(label, value, cls) {
      return '<div class="health-row"><span class="health-label">' + label + '</span><span class="health-value ' + cls + '">' + value + '</span></div>';
    }

    // ── Controls ──
    async function togglePause() {
      const endpoint = agentPaused ? "/api/resume" : "/api/pause";
      await fetch(endpoint, { method: "POST" });
    }

    async function trigger(taskName) {
      await fetch("/api/trigger", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ task: taskName }),
      });
    }

    // ── Init ──
    connect();
    pollMetrics();
    setInterval(pollMetrics, 3000);
  </script>
</body>
</html>
